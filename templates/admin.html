{% extends "base.html" %}
{% block content %}

<h2 class="text-3xl text-purple-400 mb-6">Admin Panel 👑</h2>

<div class="grid grid-cols-2 gap-6">

    <div class="glass p-6">
        <h3 class="mb-4 text-blue-400">Users</h3>
        {% for u in users %}
        <p>{{ u.username }} ({{ u.role }})</p>
        {% endfor %}
    </div>

    <div class="glass p-6">
        <h3 class="mb-4 text-green-400">Feedback</h3>
        {% for f in feedbacks %}
        <p>{{ f.text }} - {{ f.sentiment }}</p>
        {% endfor %}
    </div>

</div>

{% endblock %}
