<!DOCTYPE html>
<html>
<head>
    <title>Register - CX Analytics</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .bg-glow {
            background: radial-gradient(circle at top, #1e3a8a, #020617);
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.6s ease;
        }

        .input {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 10px #3b82f6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="bg-glow min-h-screen flex items-center justify-center text-white">

<div class="card p-10 w-96 shadow-2xl">

    <h2 class="text-3xl font-bold mb-6 text-center bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
        Create Account 🚀
    </h2>

    <!-- 🔥 ERROR MESSAGE -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            {% if category == 'error' %}
            <div class="bg-red-500/20 text-red-400 p-3 mb-4 text-center rounded-lg animate-pulse">
                {{ message }}
            </div>
            {% endif %}
        {% endfor %}
    {% endwith %}

    <form method="POST">

        <input type="text" name="username" placeholder="Username"
               value="{{ request.form.username }}"
               class="input w-full p-3 mb-4 rounded-lg focus:outline-none">

        <input type="password" name="password" placeholder="Password"
               class="input w-full p-3 mb-6 rounded-lg focus:outline-none">

        <button class="w-full p-3 rounded-lg bg-gradient-to-r from-green-500 to-emerald-600 hover:scale-105 transition">
            Register
        </button>

    </form>

    <p class="text-center mt-4 text-sm text-gray-400">
        Already have an account?
        <a href="/login" class="text-blue-400 hover:underline">Login</a>
    </p>

</div>

</body>
</html>
